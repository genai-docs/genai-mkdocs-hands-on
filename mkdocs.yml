site_name: 生成AI時代のドキュメント基盤
site_description: Best practices for business system documentation and a collection of Mermaid diagram samples
site_author: Documentation Team
copyright: Copyright &copy; 2024 @nuits.jp

theme:
  name: material
  language: ja
  features:
    - content.code.copy

extra_css:
  - stylesheets/site.css

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js

markdown_extensions:
  - attr_list
  - toc:
      permalink: true

watch:
  - docs
  - mkdocs.yml

plugins:
  - awesome-pages
  - table-reader:
      enabled: true

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences