site_name: 生成AI時代のドキュメント基盤
site_description: Best practices for business system documentation and a collection of Mermaid diagram samples
site_author: Documentation Team
copyright: Copyright &copy; 2024 @nuits.jp

theme:
  name: material
  language: ja
  features:
    - content.code.copy

extra_css:
  - stylesheets/site.css

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js

markdown_extensions:
  - attr_list
  - toc:
      permalink: true

watch:
  - docs
  - mkdocs.yml

plugins:
  - search
  - awesome-pages
  - mermaid-to-svg:
      enabled_if_env: RENDER_SVG
      image_id_enabled: true
      image_id_prefix: mermaid-diagram
      # Disable HTML labels for PDF compatibility
      mermaid_config:
        htmlLabels: false
        flowchart:
          htmlLabels: false
        class:
          htmlLabels: false
  - svg-to-png:
      enabled_if_env: RENDER_PNG
  - to-pdf:
      cover_subtitle: '生成AI時代のドキュメント基盤'
      toc_title: 目次
      toc_level: 3
      output_path: pdf/生成AI時代のドキュメント基盤.pdf
      enabled_if_env: ENABLE_PDF
  - table-reader:
      enabled: true
